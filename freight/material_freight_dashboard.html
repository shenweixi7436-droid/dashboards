<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>物料运费看板</title>
  <style>
    @font-face {
      font-family: "GothamRndBold";
      src: url("assets/GOTHAMRND-BOLD.otf") format("opentype");
      font-weight: 800;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "HKYuanW7";
      src: url("assets/华康圆体-W7.ttf") format("truetype");
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "HKYuanW8";
      src: url("assets/华康圆体-W8.ttf") format("truetype");
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "HKYuanW9";
      src: url("assets/华康圆体-W9.ttf") format("truetype");
      font-weight: 800;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #f5f5f5;
      --card: #ffffff;
      --text: #333333;
      --muted: #999999;
      --line: #e9e9e9;
      --red: #d93924;
      --pink: rgb(236, 95, 116);
      --brown: rgb(112, 58, 30);
      --yellow: rgb(252, 201, 0);
      --soft: #fff6d9;
      --shadow: 0 1px 6px rgba(0, 0, 0, .07);
      --shadow-hover: 0 4px 12px rgba(0, 0, 0, .12);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "HKYuanW7", "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
    }

    .page {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: 20px;
    }

    .month-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      align-items: center;
      flex-wrap: wrap;
    }

    .month-label {
      font-family: "HKYuanW8", "Microsoft YaHei", sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: #333;
      padding-left: 10px;
      border-left: 4px solid var(--brown);
      margin-right: 4px;
      white-space: nowrap;
    }

    .month-btn {
      padding: 4px 14px;
      border-radius: 16px;
      font-size: 12px;
      background: #fff;
      color: #666;
      border: 1px solid #e0e0e0;
      cursor: pointer;
      transition: all .2s;
      font-family: "HKYuanW7", "Microsoft YaHei", sans-serif;
    }

    .month-btn:hover {
      border-color: var(--yellow);
      color: var(--brown);
    }

    .month-btn.on {
      background: var(--yellow);
      border-color: var(--yellow);
      color: #111;
    }

    .top-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 22px;
    }

    .metric,
    .panel {
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .metric {
      min-height: 124px;
      padding: 20px 24px;
      transition: transform .15s, box-shadow .15s;
    }

    .metric:hover,
    .panel:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
    }

    .metric::before,
    .panel::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      border-radius: 12px 0 0 12px;
      background: var(--brown);
    }

    .metric:nth-child(2)::before { background: var(--pink); }
    .metric:nth-child(3)::before { background: var(--red); }
    .metric:nth-child(4)::before { background: var(--red); }

    .title {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      font-family: "HKYuanW8", "Microsoft YaHei", sans-serif;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0;
      line-height: 1.25;
    }

    .icon {
      display: inline-grid;
      place-items: center;
      flex: 0 0 auto;
      width: 24px;
      height: 24px;
      border-radius: 6px;
      border: 1px solid var(--yellow);
      background: #fff;
      color: var(--red);
      font-size: 13px;
      font-family: "HKYuanW8", "Microsoft YaHei", sans-serif;
      font-weight: 800;
    }

    .metric-value {
      margin-top: 16px;
      text-align: right;
      color: var(--pink);
      font-family: "GothamRndBold", "HKYuanW9", "Arial Black", sans-serif;
      font-size: 34px;
      line-height: 1;
      font-weight: 800;
      word-break: keep-all;
      letter-spacing: 0;
    }

    .metric:first-child .metric-value { color: var(--brown); }

    .unit {
      margin-left: 2px;
      color: var(--red);
      font-size: 20px;
      font-family: "HKYuanW8", "Microsoft YaHei", sans-serif;
      font-weight: 700;
    }

    .sub {
      margin-top: 8px;
      text-align: right;
      color: #777;
      font-size: 12px;
      line-height: 1.3;
    }

    .sub strong { color: var(--red); }

    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .panel {
      padding: 20px 24px;
      transition: transform .15s, box-shadow .15s;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .badge {
      border: 1px solid var(--yellow);
      color: var(--brown);
      background: #fff;
      border-radius: 10px;
      padding: 2px 10px;
      font-size: 11px;
      font-family: "HKYuanW7", "Microsoft YaHei", sans-serif;
      white-space: nowrap;
    }

    .big-number {
      color: var(--red);
      font-family: "GothamRndBold", "HKYuanW9", "Arial Black", sans-serif;
      font-size: 34px;
      line-height: 1.2;
      font-weight: 800;
      margin-bottom: 4px;
      letter-spacing: 0;
    }

    .summary {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      color: #666;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .summary strong { color: var(--red); }

    .bars {
      display: grid;
      gap: 10px;
      padding-right: 2px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 150px 1fr 86px;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      font-family: "HKYuanW7", "Microsoft YaHei", sans-serif;
    }

    .bar-label {
      color: #555;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .track {
      position: relative;
      height: 14px;
      overflow: hidden;
      border-radius: 8px;
      background: #f1f3f4;
    }

    .fill {
      height: 100%;
      min-width: 5px;
      border-radius: inherit;
      background: var(--brown);
    }

    .bar-value {
      color: var(--red);
      text-align: right;
      white-space: nowrap;
      font-family: "GothamRndBold", "HKYuanW9", "Arial Black", sans-serif;
      font-weight: 800;
      letter-spacing: 0;
    }

    .hint {
      margin-top: 16px;
      color: #999;
      font-size: 12px;
      line-height: 1.7;
    }

    @media (max-width: 1100px) {
      .top-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .dashboard-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .page { padding: 12px; }
      .top-grid { grid-template-columns: 1fr; }
      .metric, .panel { padding: 18px 20px; }
      .bar-row { grid-template-columns: 104px 1fr; }
      .bar-value { grid-column: 2; text-align: left; }
    }
  </style>
</head>

    const fmt = new Intl.NumberFormat("zh-CN");
    const money = (n) => "¥" + fmt.format(Number(n || 0).toFixed(2));
    const number = (n) => fmt.format(Number(n || 0));
    const percent = (n) => Number(n || 0).toFixed(1) + "%";
    let current = payload.months[payload.months.length - 1];

    function compareText(value) {
      if (value === null || value === undefined || Number.isNaN(Number(value))) {
        return "/";
      }
      const numeric = Number(value);
      const sign = numeric > 0 ? "+" : "";
      return `环比上月 ${sign}${numeric.toFixed(1)}%`;
    }

    function topRows(key, limit = 16) {
      return [...current.rows]
        .sort((a, b) => Number(b[key] || 0) - Number(a[key] || 0))
        .slice(0, limit);
    }

    function renderMonthFilter() {
      document.getElementById("monthFilter").innerHTML = `
        <span class="month-label">月份</span>
        ${payload.months.map((month) => `
          <button class="month-btn ${month.month === current.month ? "on" : ""}" data-month="${month.month}">
            ${month.month}
          </button>
        `).join("")}
      `;
      document.querySelectorAll(".month-btn").forEach((button) => {
        button.addEventListener("click", () => {
          current = payload.months.find((month) => month.month === button.dataset.month) || current;
          render();
        });
      });
    }

    function renderCards() {
      const cards = [
        ["运", "本月运费", money(current.cards.freight), "", compareText(current.compare.freight)],
        ["单", "本月订单数", number(current.cards.orders), "单", compareText(current.compare.orders)],
        ["异", "本月异常订单数", number(current.cards.abnormalOrders), "单", compareText(current.compare.abnormalOrders)],
        ["占", "当月整体运费占比", percent(current.cards.freightRatio), "", compareText(current.compare.freightRatio)],
      ];

      document.getElementById("topCards").innerHTML = cards.map(([icon, title, value, unit, sub]) => `
        <article class="metric">
          <div class="title"><span class="icon">${icon}</span>${title}</div>
          <div class="metric-value">${value}${unit ? `<span class="unit">${unit}</span>` : ""}</div>
          <div class="sub">${sub}</div>
        </article>
      `).join("");
    }

    function barRows(key, unit, formatter = number, limit = 16, filterFn = null) {
      const rows = (filterFn ? current.rows.filter(filterFn) : current.rows)
        .sort((a, b) => Number(b[key] || 0) - Number(a[key] || 0))
        .slice(0, limit);
      const max = Math.max(1, ...rows.map((row) => Number(row[key] || 0)));
      return `<div class="bars">` + rows.map((row) => {
        const value = Number(row[key] || 0);
        const width = Math.max(value / max * 100, value > 0 ? 3 : 0);
        return `
          <div class="bar-row" title="${row.name}">
            <div class="bar-label">${row.name}</div>
            <div class="track"><div class="fill" style="width:${width}%"></div></div>
            <div class="bar-value">${formatter(value, row)}${unit}</div>
          </div>
        `;
      }).join("") + `</div>`;
    }

    function renderPanels() {
      document.getElementById("panels").innerHTML = `
        <article class="panel">
          <div class="panel-head">
            <div class="title"><span class="icon">异</span>各物料异常订单量</div>
            <span class="badge">${current.month}</span>
          </div>
          <div class="big-number">${number(current.cards.abnormalOrders)}单</div>
          <div class="summary"><span>异常标准：<strong>运费占比超30%</strong></span><span>仅显示当月异常物料</span></div>

          <div class="big-number">${number(current.cards.shipmentQuantity)}件</div>
          <div class="summary"><span>字段：<strong>总数量</strong></span><span>按物料名称清洗汇总</span></div>

        </article>

        <article class="panel">
          <div class="panel-head">
            <div class="title"><span class="icon">单</span>各物料订单数</div>
            <span class="badge">${current.month}</span>
          </div>
          <div class="big-number">${number(current.cards.orders)}单</div>
          <div class="summary"><span>字段：<strong>出库单号</strong></span><span>统计方式：去重</span></div>

        </article>

        <article class="panel">

          <div class="big-number">${money(current.cards.freight)}</div>
          <div class="summary"><span>整体运费占比：<strong>${percent(current.cards.freightRatio)}</strong></span><span>按运费金额排序</span></div>
          ${barRows("freightAmount", "", money)}
        </article>
      `;
    }

    function renderHint() {

      renderMonthFilter();
