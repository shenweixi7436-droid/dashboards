<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>物料运费看板</title>
  <style>
    @font-face {
      font-family: "GothamRndBold";
      src: url("assets/GOTHAMRND-BOLD.otf") format("opentype");
      font-weight: 800;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "HKYuanW7";
      src: url("assets/华康圆体-W7.ttf") format("truetype");
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "HKYuanW8";
      src: url("assets/华康圆体-W8.ttf") format("truetype");
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "HKYuanW9";
      src: url("assets/华康圆体-W9.ttf") format("truetype");
      font-weight: 800;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #f5f5f5;
      --card: #ffffff;
      --text: #333333;
      --muted: #999999;
      --line: #e9e9e9;
      --red: #d93924;
      --pink: rgb(236, 95, 116);
      --brown: rgb(112, 58, 30);
      --yellow: rgb(252, 201, 0);
      --soft: #fff6d9;
      --shadow: 0 1px 6px rgba(0, 0, 0, .07);
      --shadow-hover: 0 4px 12px rgba(0, 0, 0, .12);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "HKYuanW7", "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
    }

    .page {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: 20px;
    }

    .month-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      align-items: center;
      flex-wrap: wrap;
    }

    .month-label {
      font-family: "HKYuanW8", "Microsoft YaHei", sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: #333;
      padding-left: 10px;
      border-left: 4px solid var(--brown);
      margin-right: 4px;
      white-space: nowrap;
    }

    .month-btn {
      padding: 4px 14px;
      border-radius: 16px;
      font-size: 12px;
      background: #fff;
      color: #666;
      border: 1px solid #e0e0e0;
      cursor: pointer;
      transition: all .2s;
      font-family: "HKYuanW7", "Microsoft YaHei", sans-serif;
    }

    .month-btn:hover {
      border-color: var(--yellow);
      color: var(--brown);
    }

    .month-btn.on {
      background: var(--yellow);
      border-color: var(--yellow);
      color: #111;
    }

    .top-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 22px;
    }

    .metric,
    .panel {
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .metric {
      min-height: 124px;
      padding: 20px 24px;
      transition: transform .15s, box-shadow .15s;
    }

    .metric:hover,
    .panel:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
    }

    .metric::before,
    .panel::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      border-radius: 12px 0 0 12px;
      background: var(--brown);
    }

    .metric:nth-child(2)::before { background: var(--pink); }
    .metric:nth-child(3)::before { background: var(--red); }
    .metric:nth-child(4)::before { background: var(--red); }

    .title {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      font-family: "HKYuanW8", "Microsoft YaHei", sans-serif;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0;
      line-height: 1.25;
    }

    .icon {
      display: inline-grid;
      place-items: center;
      flex: 0 0 auto;
      width: 24px;
      height: 24px;
      border-radius: 6px;
      border: 1px solid var(--yellow);
      background: #fff;
      color: var(--red);
      font-size: 13px;
      font-family: "HKYuanW8", "Microsoft YaHei", sans-serif;
      font-weight: 800;
    }

    .metric-value {
      margin-top: 16px;
      text-align: right;
      color: var(--pink);
      font-family: "GothamRndBold", "HKYuanW9", "Arial Black", sans-serif;
      font-size: 34px;
      line-height: 1;
      font-weight: 800;
      word-break: keep-all;
      letter-spacing: 0;
    }

    .metric:first-child .metric-value { color: var(--brown); }

    .unit {
      margin-left: 2px;
      color: var(--red);
      font-size: 20px;
      font-family: "HKYuanW8", "Microsoft YaHei", sans-serif;
      font-weight: 700;
    }

    .sub {
      margin-top: 8px;
      text-align: right;
      color: #777;
      font-size: 12px;
      line-height: 1.3;
    }

    .sub strong { color: var(--red); }

    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .panel {
      padding: 20px 24px;
      transition: transform .15s, box-shadow .15s;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .badge {
      border: 1px solid var(--yellow);
      color: var(--brown);
      background: #fff;
      border-radius: 10px;
      padding: 2px 10px;
      font-size: 11px;
      font-family: "HKYuanW7", "Microsoft YaHei", sans-serif;
      white-space: nowrap;
    }

    .big-number {
      color: var(--red);
      font-family: "GothamRndBold", "HKYuanW9", "Arial Black", sans-serif;
      font-size: 34px;
      line-height: 1.2;
      font-weight: 800;
      margin-bottom: 4px;
      letter-spacing: 0;
    }

    .summary {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      color: #666;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .summary strong { color: var(--red); }

    .panel-block {
      display: grid;
      gap: 18px;
    }

    .split-chart {
      display: grid;
      gap: 16px;
    }

    .chart-card {
      border: 1px solid #f0f0f0;
      border-radius: 12px;
      padding: 14px 16px 12px;
      background: linear-gradient(180deg, #fff, #fffdf8);
    }

    .chart-card.pink {
      background: linear-gradient(180deg, #fff, #fff7fa);
    }

    .chart-headline {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .chart-title {
      font-size: 13px;
      color: #444;
      font-family: "HKYuanW8", "Microsoft YaHei", sans-serif;
      font-weight: 700;
    }

    .chart-total {
      color: var(--red);
      font-family: "GothamRndBold", "HKYuanW9", "Arial Black", sans-serif;
      font-size: 22px;
      line-height: 1;
      white-space: nowrap;
    }

    .chart-meta {
      margin-bottom: 12px;
      color: #888;
      font-size: 12px;
      line-height: 1.5;
    }

    .viz-scroll {
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 4px;
    }

    .viz-scroll::-webkit-scrollbar {
      height: 8px;
    }

    .viz-scroll::-webkit-scrollbar-thumb {
      background: #ddd;
      border-radius: 999px;
    }

    .column-chart {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      min-height: 236px;
      padding-top: 8px;
    }

    .column-item {
      width: 74px;
      flex: 0 0 74px;
      display: grid;
      grid-template-rows: auto 152px auto auto;
      gap: 8px;
      align-items: end;
    }

    .column-value {
      min-height: 32px;
      text-align: center;
      color: var(--red);
      font-family: "GothamRndBold", "HKYuanW9", "Arial Black", sans-serif;
      font-size: 16px;
      line-height: 1.1;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .column-track {
      position: relative;
      height: 152px;
      border-radius: 12px 12px 10px 10px;
      background: linear-gradient(180deg, #faf7f2, #f1f3f4);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      overflow: hidden;
    }

    .column-bar {
      width: 44px;
      min-height: 4px;
      border-radius: 12px 12px 0 0;
      background: linear-gradient(180deg, #9a5a31, #6f391d);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.35);
    }

    .column-bar.pink {
      background: linear-gradient(180deg, #ff8aa1, #ec5f74);
    }

    .column-bar.gold {
      background: linear-gradient(180deg, #ffd861, #f0a400);
    }

    .column-label {
      font-size: 12px;
      line-height: 1.35;
      color: #555;
      text-align: center;
      word-break: break-all;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 32px;
    }

    .column-sub {
      font-size: 11px;
      line-height: 1.3;
      color: #8d8d8d;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .line-chart-wrap {
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 4px;
    }

    .line-chart {
      min-height: 248px;
      display: block;
    }

    .chart-note {
      margin-top: 8px;
      color: #8b8b8b;
      font-size: 12px;
      line-height: 1.5;
    }

    .tip-target {
      cursor: pointer;
    }

    .tooltip {
      position: fixed;
      z-index: 30;
      max-width: 280px;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(51, 51, 51, .95);
      color: #fff;
      font-size: 12px;
      line-height: 1.5;
      box-shadow: 0 8px 20px rgba(0,0,0,.18);
      pointer-events: none;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity .12s ease, transform .12s ease;
    }

    .tooltip.on {
      opacity: 1;
      transform: translateY(0);
    }

    .bars {
      display: grid;
      gap: 10px;
      padding-right: 2px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 150px 1fr 86px;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      font-family: "HKYuanW7", "Microsoft YaHei", sans-serif;
    }

    .bar-label {
      color: #555;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .track {
      position: relative;
      height: 14px;
      overflow: hidden;
      border-radius: 8px;
      background: #f1f3f4;
    }

    .fill {
      height: 100%;
      min-width: 5px;
      border-radius: inherit;
      background: var(--brown);
    }

    .bar-value {
      color: var(--red);
      text-align: right;
      white-space: nowrap;
      font-family: "GothamRndBold", "HKYuanW9", "Arial Black", sans-serif;
      font-weight: 800;
      letter-spacing: 0;
    }

    .hint {
      margin-top: 16px;
      color: #999;
      font-size: 12px;
      line-height: 1.7;
    }

    @media (max-width: 1100px) {
      .top-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .dashboard-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .page { padding: 12px; }
      .top-grid { grid-template-columns: 1fr; }
      .metric, .panel { padding: 18px 20px; }
      .bar-row { grid-template-columns: 104px 1fr; }
      .bar-value { grid-column: 2; text-align: left; }
      .column-item {
        width: 64px;
        flex-basis: 64px;
      }
      .column-bar {
        width: 38px;
      }
    }
  </style>
</head>

        return "/";

      const numeric = Number(value);
      const sign = numeric > 0 ? "+" : "";
      return `环比上月 ${sign}${numeric.toFixed(1)}%`;
    }

    function topRows(key, limit = 16) {
      return [...current.rows]

      `;

          render();
        });
      });

      const cards = [
        ["运", "本月运费", money(current.cards.freight), "", compareText(current.compare.freight)],

        ["异", "本月异常订单数", number(current.cards.abnormalOrders), "单", compareText(current.compare.abnormalOrders)],

          <div class="title"><span class="icon">${icon}</span>${title}</div>
          <div class="metric-value">${value}${unit ? `<span class="unit">${unit}</span>` : ""}</div>
          <div class="sub">${sub}</div>
        </article>

    function barRows(key, unit, formatter = number, limit = 16, filterFn = null) {
      const rows = (filterFn ? current.rows.filter(filterFn) : current.rows)

      const max = Math.max(1, ...rows.map((row) => Number(row[key] || 0)));
      return `<div class="bars">` + rows.map((row) => {

      const fmt2 = new Intl.NumberFormat("zh-CN");

      function escapeHtml2(value) {

          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function compareText2(value) {
        if (value === null || value === undefined || Number.isNaN(Number(value))) return "/";
        const numeric = Number(value);
        return `环比上月 ${numeric > 0 ? "+" : ""}${numeric.toFixed(1)}%`;
      }

      function shortLabel2(value, length = 8) {
        const text = String(value ?? "");
        return text.length > length ? `${text.slice(0, length)}…` : text;
      }

      function ensureTooltip2() {
        let tooltip = document.getElementById("dashboardTooltip");
        if (!tooltip) {
          tooltip = document.createElement("div");
          tooltip.id = "dashboardTooltip";
          tooltip.className = "tooltip";
          document.body.appendChild(tooltip);
        }
        return tooltip;
      }

      function bindTooltips2() {
        const tooltip = ensureTooltip2();
        document.querySelectorAll(".tip-target").forEach((node) => {
          node.onmousemove = (event) => {
            tooltip.innerHTML = node.dataset.tip || "";
            tooltip.classList.add("on");
            const offset = 14;
            tooltip.style.left = `${Math.min(window.innerWidth - 12 - tooltip.offsetWidth, event.clientX + offset)}px`;
            tooltip.style.top = `${Math.max(12, event.clientY - tooltip.offsetHeight - offset)}px`;
          };
          node.onmouseleave = () => tooltip.classList.remove("on");
        });
      }

      function anomalyFor(month) {
        return anomalyPanels.find((item) => item.month === month) || anomalyPanels[0];
      }

      function topRowsBy2(rows, key, limit = 10, filterFn = null, sorter = null) {
        const list = filterFn ? rows.filter(filterFn) : [...rows];
        return list.sort(sorter || ((a, b) => Number(b[key] || 0) - Number(a[key] || 0))).slice(0, limit);
      }

      function renderColumnChart2(rows, options = {}) {
        const { color = "", valueFormatter = (value) => number2(value), subFormatter = () => "" } = options;
        const list = rows || [];
        const max = Math.max(1, ...list.map((row) => Number(row.value ?? row.orders ?? 0)));
        return `<div class="viz-scroll"><div class="column-chart" style="min-width:${Math.max(520, list.length * 86)}px">${list.map((row) => {
          const raw = Number(row.value ?? row.orders ?? 0);
          const detail = subFormatter(row);
          return `<div class="column-item tip-target" data-tip="${escapeHtml2(`${row.name}<br>${valueFormatter(raw, row)}${detail ? `<br>${detail}` : ""}`)}"><div class="column-value">${valueFormatter(raw, row)}</div><div class="column-track"><div class="column-bar ${color}" style="height:${Math.max(6, raw / max * 100)}%"></div></div><div class="column-label">${escapeHtml2(row.name)}</div><div class="column-sub">${escapeHtml2(detail || "")}</div></div>`;
        }).join("")}</div></div>`;
      }

      function renderLineChart2(points, options = {}) {
        const { color = "#7a3f20", activeColor = "#ec5f74", activeIndex = -1, height = 240, labelFormatter = (item) => item.label, valueFormatter = (value) => number2(value), tipFormatter = (item) => `${item.label}<br>${valueFormatter(item.value)}` } = options;
        const width = Math.max(560, points.length * 88);
        const padding = { top: 22, right: 28, bottom: 60, left: 24 };
        const max = Math.max(1, ...points.map((item) => Number(item.value || 0)));
        const innerWidth = width - padding.left - padding.right;
        const innerHeight = height - padding.top - padding.bottom;
        const step = points.length > 1 ? innerWidth / (points.length - 1) : 0;
        const getX = (index) => padding.left + step * index;
        const getY = (value) => padding.top + (1 - Number(value || 0) / max) * innerHeight;
        const grid = [0, .25, .5, .75, 1].map((ratio) => {
          const y = padding.top + innerHeight * ratio;
          return `<line x1="${padding.left}" y1="${y}" x2="${width - padding.right}" y2="${y}" stroke="#eeeeee" stroke-width="1" />`;
        }).join("");
        return `<div class="line-chart-wrap"><svg class="line-chart" viewBox="0 0 ${width} ${height}" style="width:${width}px" preserveAspectRatio="xMinYMin meet">${grid}<polyline points="${points.map((item, index) => `${getX(index)},${getY(item.value)}`).join(" ")}" fill="none" stroke="${color}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></polyline>${points.map((item, index) => { const x = getX(index); const y = getY(item.value); const active = index === activeIndex; const circleColor = active ? activeColor : color; const lineColor = active ? "rgba(236,95,116,.18)" : "rgba(122,63,32,.08)"; return `<g><line x1="${x}" y1="${padding.top}" x2="${x}" y2="${padding.top + innerHeight}" stroke="${lineColor}" stroke-width="${active ? 2 : 1}"></line><circle class="tip-target" data-tip="${escapeHtml2(tipFormatter(item, index))}" cx="${x}" cy="${y}" r="${active ? 6 : 5}" fill="#fff" stroke="${circleColor}" stroke-width="3"></circle><text x="${x}" y="${y - 12}" text-anchor="middle" font-size="12" fill="${circleColor}" font-family="Microsoft YaHei, PingFang SC, sans-serif">${escapeHtml2(valueFormatter(item.value))}</text><text x="${x}" y="${height - 22}" text-anchor="middle" font-size="12" fill="${active ? activeColor : "#666"}" font-family="Microsoft YaHei, PingFang SC, sans-serif">${escapeHtml2(shortLabel2(labelFormatter(item), 8))}</text></g>`; }).join("")}</svg></div>`;
      }

      function renderFreightRows2(currentRows) {
        const list = topRowsBy2(currentRows, "freightAmount", 16);
        const max = Math.max(1, ...list.map((item) => Number(item.freightAmount || 0)));
        return `<div class="bars">${list.map((row) => `<div class="bar-row" title="${escapeHtml2(row.name)}"><div class="bar-label">${escapeHtml2(row.name)}</div><div class="track"><div class="fill" style="width:${Math.max(Number(row.freightAmount || 0) / max * 100, Number(row.freightAmount || 0) > 0 ? 3 : 0)}%"></div></div><div class="bar-value">${money2(row.freightAmount)}</div></div>`).join("")}</div>`;
      }

      function renderDashboardView() {

        const shipmentTop10 = topRowsBy2(current.rows, "shipmentQuantity", 10).map((row) => ({ label: row.name, value: Number(row.shipmentQuantity || 0) }));
        const shipmentByMonth = monthSeries2.map((month) => ({ label: month.month, value: Number(month.cards.shipmentQuantity || 0) }));
        const activeMonthIndex = monthSeries2.findIndex((item) => item.month === current.month);
        const orderColumns = [...current.rows].filter((row) => Number(row.orders || 0) > 0).sort((a, b) => Number(b.freightAmount || 0) - Number(a.freightAmount || 0)).map((row) => ({ name: row.name, value: Number(row.orders || 0), freightAmount: Number(row.freightAmount || 0) }));

        panels.innerHTML = `
          <article class="panel">

                <section class="chart-card pink">

                  <div class="chart-meta">与上方分开展示，颜色区分不同口径</div>
                  ${renderColumnChart2(anomaly.goodsValue.rows, { color: "pink", valueFormatter: (value) => `${number2(value)}单` })}
                </section>
              </div>
            </div>
          </article>
          <article class="panel">
            <div class="panel-head"><div class="title"><span class="icon">发</span>各物料发货数量</div><span class="badge">${current.month}</span></div>
            <div class="panel-block">
              <div>
                <div class="big-number">${number2(current.cards.shipmentQuantity)}件</div>
                <div class="summary"><span>当月发货最多的前 10 个物料</span><span>悬浮查看对应明细</span></div>
                ${renderLineChart2(shipmentTop10, { activeColor: "#f0a400", activeIndex: shipmentTop10.length ? 0 : -1, valueFormatter: (value) => `${number2(value)}件` })}
              </div>
              <div class="chart-card">
                <div class="chart-headline"><div class="chart-title">截至最新月份每月发货数量</div><div class="chart-total">${current.month === "全年" ? "全年" : current.month}</div></div>

                ${renderLineChart2(shipmentByMonth, { activeIndex: current.month === "全年" ? -1 : activeMonthIndex, valueFormatter: (value) => `${number2(value)}件`, tipFormatter: (item) => `${item.label}<br>发货数量：${number2(item.value)}件` })}
              </div>
            </div>
          </article>
          <article class="panel">
            <div class="panel-head"><div class="title"><span class="icon">单</span>各物料订单数</div><span class="badge">${current.month}</span></div>
            <div class="big-number">${number2(current.cards.orders)}单</div>
            <div class="summary"><span>保留去重订单逻辑</span><span>按当月运费金额由高到低排序</span></div>
            ${renderColumnChart2(orderColumns, { color: "gold", valueFormatter: (value) => `${number2(value)}单`, subFormatter: (row) => `运费 ${money2(row.freightAmount)}` })}
            <div class="chart-note">柱高表示订单数量，底部补充该物料对应的运费求和。</div>

          <article class="panel">

            <div class="big-number">${money2(current.cards.freight)}</div>
            <div class="summary"><span>整体运费占比：<strong>${percent2(current.cards.freightRatio)}</strong></span><span>按运费金额排序</span></div>
            ${renderFreightRows2(current.rows)}
          </article>
        `;

        hint.innerHTML = `数据来源：${payload.sourceFile} / ${payload.sourceSheet}；数据截至 ${payload.dataThrough}，源文件更新于 ${payload.sourceModified}。订单数按出库单号去重；异常订单指运费占总费用比超过 30%；整体运费占比 = 运费 ÷（货值 + 仓储人工包材 + 运费）。当前月份：${current.month}。`;
