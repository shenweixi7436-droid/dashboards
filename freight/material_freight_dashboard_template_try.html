<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>物料运费看板 - 模板试装版</title>
<style>
:root{
  --bg:#f1f5f9;--surface:#ffffff;--bdr:#e2e8f0;--bdr-focus:#fcd34d;
  --acc:#b45309;--acc-hover:#92400e;--acc-soft:#fef3c7;
  --gr:#10b981;--rd:#dc2626;--am:#f59e0b;--bl:#3b82f6;--cy:#0891b2;--vl:#7c3aed;
  --tx:#0f172a;--t2:#475569;--t3:#64748b;--t4:#94a3b8;
  --r:16px;--rs:8px;
  --sh:0 4px 6px -1px rgba(0,0,0,.05),0 2px 4px -2px rgba(0,0,0,.05);
  --sh-hover:0 10px 15px -3px rgba(0,0,0,.08),0 4px 6px -4px rgba(0,0,0,.04);
  --pink:#ec5f74;--brown:#703a1e;--yellow:#fbbf24;--soft:#fff7ed;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--tx);font-size:13px;-webkit-font-smoothing:antialiased}
body{padding-bottom:40px}
#topbar{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--bdr);padding:0 28px;height:60px;display:flex;align-items:center;gap:16px;box-shadow:var(--sh)}
.brand{display:flex;align-items:center;gap:12px;flex-shrink:0}
.brand-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--acc),#d97706);box-shadow:0 4px 10px rgba(180,83,9,.25);color:#fff;font-size:18px;font-weight:700}
.brand-name{font-size:16px;font-weight:700;letter-spacing:-.02em;color:var(--tx)}
.brand-sub{font-size:11px;color:var(--t3);letter-spacing:.02em;margin-top:2px}
#monthbar{display:flex;gap:10px;flex-wrap:wrap;margin-left:auto;align-items:center}
.month-label{font-size:12px;color:var(--t3);font-weight:700}
.month-btn{padding:6px 14px;border-radius:999px;border:1px solid var(--bdr);background:#fff;color:var(--t2);cursor:pointer;font-size:12px;font-weight:600;transition:all .2s}
.month-btn:hover{border-color:var(--yellow);color:var(--acc)}
.month-btn.on{background:var(--yellow);border-color:var(--yellow);color:#111}
#main{padding:24px 28px 0;display:flex;flex-direction:column;gap:24px;max-width:1440px;margin:0 auto}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.kc{background:#fff;border:1px solid var(--bdr);border-radius:16px;padding:20px 24px;position:relative;overflow:hidden;box-shadow:var(--sh);transition:all .2s ease;display:flex;flex-direction:column}
.kc::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--acc)}
.kc.k0::before{background:linear-gradient(90deg,var(--acc),#d97706)}
.kc.k1::before{background:linear-gradient(90deg,var(--gr),#34d399)}
.kc.k2::before{background:linear-gradient(90deg,var(--rd),#f87171)}
.kc.k3::before{background:linear-gradient(90deg,var(--am),#fbbf24)}
.kc:hover,.cd:hover{box-shadow:var(--sh-hover);transform:translateY(-2px)}
.kc-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;font-size:17px;font-weight:700}
.k0 .kc-icon{background:var(--acc-soft);color:var(--acc)}
.k1 .kc-icon{background:#f0fdf4;color:var(--gr)}
.k2 .kc-icon{background:#fef2f2;color:var(--rd)}
.k3 .kc-icon{background:#fffbeb;color:var(--am)}
.kl{font-size:13px;font-weight:600;color:var(--t3);margin-bottom:6px;letter-spacing:.02em}
.kv{font-size:28px;font-weight:800;color:var(--tx);line-height:1.2;font-variant-numeric:tabular-nums}
.ku{font-size:12px;color:var(--t4);margin-top:8px;font-weight:500}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.cd{background:#fff;border:1px solid var(--bdr);border-radius:16px;padding:24px;box-shadow:var(--sh);min-width:0;overflow:hidden;display:flex;flex-direction:column;transition:all .2s ease}
.ch{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px;flex-shrink:0}
.ct{font-size:16px;font-weight:700;color:var(--tx);letter-spacing:-.01em}
.cs{font-size:12px;color:var(--t3);margin-top:6px;line-height:1.5}
.big-number{font-size:36px;font-weight:800;color:var(--rd);line-height:1.1;font-variant-numeric:tabular-nums;margin-bottom:10px}
.summary{display:flex;gap:18px;flex-wrap:wrap;color:var(--t3);font-size:12px;margin-bottom:16px}
.summary strong{color:var(--rd)}
.badge{border:1px solid #fcd34d;color:var(--acc);background:#fff;border-radius:10px;padding:2px 10px;font-size:11px;font-weight:700;white-space:nowrap}
.chart-card{border:1px solid #eef2f7;border-radius:14px;padding:14px 16px;background:linear-gradient(180deg,#fff,#fffbf5)}
.chart-card.pink{background:linear-gradient(180deg,#fff,#fff7fa)}
.chart-head{display:flex;justify-content:space-between;gap:12px;align-items:baseline;margin-bottom:8px}
.chart-title{font-size:13px;font-weight:700;color:var(--t2)}
.chart-total{font-size:22px;font-weight:800;color:var(--rd)}
.chart-meta{font-size:12px;color:var(--t4);margin-bottom:12px;line-height:1.5}
.stack{display:grid;gap:16px}
.viz-scroll{overflow:auto hidden;padding-bottom:6px}
.columns{display:flex;align-items:flex-end;gap:12px;min-height:236px}
.col{width:72px;flex:0 0 72px;display:grid;grid-template-rows:auto 154px auto auto;gap:8px;align-items:end}
.col-value{font-size:15px;font-weight:800;color:var(--rd);text-align:center;min-height:32px}
.col-track{height:154px;border-radius:12px 12px 10px 10px;background:linear-gradient(180deg,#faf7f2,#f1f5f9);display:flex;align-items:flex-end;justify-content:center;overflow:hidden}
.col-bar{width:44px;min-height:6px;border-radius:12px 12px 0 0;background:linear-gradient(180deg,#9a5a31,#6f391d)}
.col-bar.pink{background:linear-gradient(180deg,#ff8aa1,#ec5f74)}
.col-bar.gold{background:linear-gradient(180deg,#ffd861,#f0a400)}
.col-label{font-size:12px;line-height:1.35;color:#555;text-align:center;word-break:break-all;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:32px}
.col-sub{font-size:11px;line-height:1.3;color:#8d8d8d;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.line-wrap{overflow:auto hidden;padding-bottom:6px}
.line-svg{display:block}
.bars{display:grid;gap:10px}
.bar-row{display:grid;grid-template-columns:150px 1fr 90px;align-items:center;gap:10px;font-size:13px}
.bar-label{color:#555;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.track{position:relative;height:14px;overflow:hidden;border-radius:8px;background:#f1f3f4}
.fill{height:100%;min-width:5px;border-radius:inherit;background:var(--brown)}
.bar-value{color:var(--rd);text-align:right;white-space:nowrap;font-weight:800}
.hint{font-size:12px;color:var(--t4);line-height:1.7}
.tooltip{position:fixed;z-index:300;max-width:280px;padding:10px 12px;border-radius:10px;background:rgba(15,23,42,.95);color:#fff;font-size:12px;line-height:1.5;pointer-events:none;opacity:0;transform:translateY(6px);transition:opacity .12s ease,transform .12s ease;box-shadow:0 20px 25px -5px rgba(0,0,0,.1),0 8px 10px -6px rgba(0,0,0,.1)}
.tooltip.on{opacity:1;transform:translateY(0)}
.tip-target{cursor:pointer}
@media(max-width:1000px){.kpi-row,.row-2{grid-template-columns:1fr}}
@media(max-width:768px){#topbar{padding:12px 16px;flex-wrap:wrap;height:auto}#monthbar{width:100%;justify-content:flex-start;margin-left:0}#main{padding:16px}.kpi-row{grid-template-columns:1fr 1fr}}
@media(max-width:640px){.kpi-row{grid-template-columns:1fr}.col{width:64px;flex-basis:64px}.col-bar{width:38px}.bar-row{grid-template-columns:104px 1fr}.bar-value{grid-column:2;text-align:left}}
</style>
</head>

      tip.style.left = `${Math.min(window.innerWidth - 12 - tip.offsetWidth, event.clientX + offset)}px`;

  return `<div class="line-wrap"><svg class="line-svg" viewBox="0 0 ${width} ${height}" style="width:${width}px" preserveAspectRatio="xMinYMin meet">
    ${grid}
    <polyline points="${points.map((item, index) => `${getX(index)},${getY(item.value)}`).join(" ")}" fill="none" stroke="${color}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></polyline>
    ${points.map((item, index) => {
      const x = getX(index);
      const y = getY(item.value);
      const active = index === activeIndex;
      const pointColor = active ? activeColor : color;
      return `<g>
        <line x1="${x}" y1="${padding.top}" x2="${x}" y2="${padding.top + innerHeight}" stroke="${active ? "rgba(236,95,116,.18)" : "rgba(122,63,32,.08)"}" stroke-width="${active ? 2 : 1}"></line>
        <circle class="tip-target" data-tip="${escapeHtml(tipFormatter(item, index))}" cx="${x}" cy="${y}" r="${active ? 6 : 5}" fill="#fff" stroke="${pointColor}" stroke-width="3"></circle>
        <text x="${x}" y="${y - 12}" text-anchor="middle" font-size="12" fill="${pointColor}" font-family="Microsoft YaHei, PingFang SC, sans-serif">${escapeHtml(valueFormatter(item.value))}</text>
        <text x="${x}" y="${height - 22}" text-anchor="middle" font-size="12" fill="${active ? activeColor : "#666"}" font-family="Microsoft YaHei, PingFang SC, sans-serif">${escapeHtml(shortLabel(item.label, 8))}</text>
      </g>`;
    }).join("")}
  </svg></div>`;
}

function renderBars(rows) {
  const max = Math.max(1, ...rows.map((row) => Number(row.freightAmount || 0)));
  return `<div class="bars">${rows.map((row) => `
    <div class="bar-row" title="${escapeHtml(row.name)}">
      <div class="bar-label">${escapeHtml(row.name)}</div>
      <div class="track"><div class="fill" style="width:${Math.max(Number(row.freightAmount || 0) / max * 100, Number(row.freightAmount || 0) > 0 ? 3 : 0)}%"></div></div>
      <div class="bar-value">${money(row.freightAmount)}</div>
    </div>
  `).join("")}</div>`;
}

function render() {
  document.getElementById("monthbar").innerHTML = `<span class="month-label">月份</span>${payload.months.map((month) => `<button class="month-btn ${month.month === current.month ? "on" : ""}" data-month="${month.month}">${month.month}</button>`).join("")}`;
  document.querySelectorAll(".month-btn").forEach((button) => {
    button.onclick = () => {
      current = payload.months.find((month) => month.month === button.dataset.month) || current;
      render();
    };
  });

  const kpis = [
    ["运", "本月运费", money(current.cards.freight), compareText(current.compare.freight)],
    ["单", "本月订单数", `${number(current.cards.orders)}单`, compareText(current.compare.orders)],
    ["异", "本月异常订单数", `${number(current.cards.abnormalOrders)}单`, compareText(current.compare.abnormalOrders)],
    ["占", "当月整体运费占比", percent(current.cards.freightRatio), compareText(current.compare.freightRatio)],
  ];
  document.getElementById("kpi").innerHTML = kpis.map((item, index) => `
    <article class="kc k${index}">
      <div class="kc-icon">${item[0]}</div>
      <div class="kl">${item[1]}</div>
      <div class="kv">${item[2]}</div>
      <div class="ku">${item[3]}</div>
    </article>
  `).join("");

  const anomaly = getAnomaly();
  const shipmentTop10 = topRowsBy(current.rows, "shipmentQuantity", 10).map((row) => ({ label: row.name, value: Number(row.shipmentQuantity || 0) }));
  const shipmentByMonth = monthSeries.map((month) => ({ label: month.month, value: Number(month.cards.shipmentQuantity || 0) }));
  const activeMonthIndex = monthSeries.findIndex((item) => item.month === current.month);
  const orderColumns = [...current.rows]
    .filter((row) => Number(row.orders || 0) > 0)
    .sort((a, b) => Number(b.freightAmount || 0) - Number(a.freightAmount || 0))
    .map((row) => ({ name: row.name, value: Number(row.orders || 0), freightAmount: Number(row.freightAmount || 0) }));
  const freightRows = topRowsBy(current.rows, "freightAmount", 16);

  document.getElementById("grid").innerHTML = `
    <article class="cd">
      <div class="ch"><div><div class="ct">各物料异常订单量</div><div class="cs">保留模板卡片结构，只替换成物料运费看板逻辑</div></div><span class="badge">${current.month}</span></div>
      <div class="stack">
        <section class="chart-card">
          <div class="chart-head"><div class="chart-title">${anomaly.feeTotal.title}</div><div class="chart-total">${number(anomaly.feeTotal.rows.reduce((sum, row) => sum + row.value, 0))}单</div></div>
          <div class="chart-meta">按去重异常订单数展示</div>
          ${renderColumns(anomaly.feeTotal.rows, { valueFormatter: (value) => `${number(value)}单` })}
        </section>
        <section class="chart-card pink">
          <div class="chart-head"><div class="chart-title">${anomaly.goodsValue.title}</div><div class="chart-total">${number(anomaly.goodsValue.rows.reduce((sum, row) => sum + row.value, 0))}单</div></div>
          <div class="chart-meta">第二组口径单独展示，颜色区分</div>
          ${renderColumns(anomaly.goodsValue.rows, { color: "pink", valueFormatter: (value) => `${number(value)}单` })}
        </section>
      </div>
    </article>

    <article class="cd">
      <div class="ch"><div><div class="ct">各物料发货数量</div><div class="cs">沿用模板的大卡片形式，上下两组图</div></div><span class="badge">${current.month}</span></div>
      <div class="stack">
        <section>
          <div class="big-number">${number(current.cards.shipmentQuantity)}件</div>
          <div class="summary"><span>当月前 10 个发货最多的物料</span><span>悬浮查看明细</span></div>
          ${renderLine(shipmentTop10, { activeColor: "#f0a400", activeIndex: shipmentTop10.length ? 0 : -1, valueFormatter: (value) => `${number(value)}件` })}
        </section>
        <section class="chart-card">
          <div class="chart-head"><div class="chart-title">截至最新月份每月发货数量</div><div class="chart-total">${current.month === "全年" ? "全年" : current.month}</div></div>
          <div class="chart-meta">选中月份高亮显示</div>
          ${renderLine(shipmentByMonth, { activeIndex: current.month === "全年" ? -1 : activeMonthIndex, valueFormatter: (value) => `${number(value)}件`, tipFormatter: (item) => `${item.label}<br>发货数量：${number(item.value)}件` })}
        </section>
      </div>
    </article>

    <article class="cd">
      <div class="ch"><div><div class="ct">各物料订单数</div><div class="cs">保留去重逻辑，按运费金额由高到低排序</div></div><span class="badge">${current.month}</span></div>
      <div class="big-number">${number(current.cards.orders)}单</div>
      <div class="summary"><span>柱高表示订单数</span><span>底部补充运费求和</span></div>
      ${renderColumns(orderColumns, { color: "gold", valueFormatter: (value) => `${number(value)}单`, subFormatter: (row) => `运费 ${money(row.freightAmount)}` })}
    </article>

    <article class="cd">
      <div class="ch"><div><div class="ct">各物料运费金额</div><div class="cs">保留模板表意方式，继续按运费金额排序</div></div><span class="badge">${current.month}</span></div>
      <div class="big-number">${money(current.cards.freight)}</div>
      <div class="summary"><span>整体运费占比：<strong>${percent(current.cards.freightRatio)}</strong></span><span>Top 16 物料</span></div>
      ${renderBars(freightRows)}
    </article>
  `;

  document.getElementById("hint").innerHTML = `数据来源：${payload.sourceFile} / ${payload.sourceSheet}。当前月份：${current.month}。这是套用“采购品类集中度分析”模板样式的试装版。`;
  bindTips();
}

render();
</script>
</body>
</html>
