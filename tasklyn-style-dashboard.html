<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>物料/设备看板</title>
  <style>
    @font-face {
      font-family: "HKYuan";
      src: url("../assets/fonts/HKYuanW7.ttf") format("truetype");
      font-weight: 500;
      font-display: swap;
    }

    @font-face {
      font-family: "HKYuan";
      src: url("../assets/fonts/HKYuanW9.ttf") format("truetype");
      font-weight: 800;
      font-display: swap;
    }

    :root {
      --page-bg: #dde4ee;
      --shell-bg: rgba(246, 248, 252, 0.72);
      --panel-bg: rgba(255, 255, 255, 0.76);
      --panel-strong: rgba(255, 255, 255, 0.9);
      --ink: #2e3140;
      --muted: #8d93a3;
      --line: rgba(114, 124, 146, 0.16);
      --nav: #27204c;
      --blue: #cfe2fb;
      --lilac: #e9e7fb;
      --peach: #fbd6c8;
      --mint: #d7efe3;
      --rose: #f7d5e1;
      --orange: #e58258;
      --purple: #8362d6;
      --sky: #6ea7de;
      --shadow: 0 22px 60px rgba(75, 84, 110, 0.18);
      --soft-shadow: 0 14px 30px rgba(84, 94, 122, 0.12);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 14px;
      --font-main: "HKYuan", "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 14%, rgba(255, 255, 255, 0.62), transparent 30%),
        radial-gradient(circle at 86% 18%, rgba(209, 223, 239, 0.92), transparent 28%),
        linear-gradient(135deg, #cfd7e4 0%, #eef2f8 45%, #d4dce8 100%);
      font-family: var(--font-main);
      letter-spacing: 0;
    }

    button {
      font: inherit;
    }

    .dashboard {
      width: min(1280px, calc(100vw - 32px));
      margin: 28px auto;
      padding: 28px;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 36px;
      background: var(--shell-bg);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr;
      align-items: center;
      gap: 24px;
      min-height: 58px;
      padding: 10px 18px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.64);
      box-shadow: 0 14px 34px rgba(88, 98, 128, 0.08);
    }

    .nav {
      display: flex;
      justify-content: center;
      gap: 6px;
      min-width: 0;
      overflow-x: auto;
      padding: 0 4px 4px;
    }

    .nav button {
      border: 0;
      cursor: pointer;
      color: #606678;
      background: transparent;
      border-radius: 999px;
      min-height: 38px;
      padding: 0 14px;
      white-space: nowrap;
      transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
    }

    .nav button:hover {
      transform: translateY(-1px);
    }

    .nav button.active {
      color: #fff;
      background: var(--nav);
      box-shadow: 0 12px 22px rgba(39, 32, 76, 0.22);
    }

    .avatar,
    .mini-avatar {
      display: grid;
      place-items: center;
      overflow: hidden;
      border-radius: 50%;
      font-weight: 800;
      color: #fff;
      background: linear-gradient(135deg, #f0b766, #f48b78);
      box-shadow: 0 8px 16px rgba(106, 90, 122, 0.16);
    }

    .avatar {
      width: 42px;
      height: 42px;
      font-size: 16px;
    }

    .project-head {
      display: grid;
      grid-template-columns: 1fr;
      align-items: center;
      gap: 20px;
      margin: 26px 8px 20px;
    }

    .project-title h1 {
      margin: 0 0 6px;
      font-size: clamp(21px, 2.2vw, 30px);
      line-height: 1.1;
    }

    .project-title p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .mini-avatar {
      width: 34px;
      height: 34px;
      margin-left: -8px;
      border: 3px solid rgba(255, 255, 255, 0.82);
      font-size: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.12fr 0.62fr 0.62fr;
      grid-template-areas:
        "tasks progress progress"
        "rank tracker chat";
      gap: 18px;
    }

    .panel {
      min-width: 0;
      padding: 22px;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: var(--radius-xl);
      background: var(--panel-bg);
      box-shadow: var(--soft-shadow);
      backdrop-filter: blur(18px);
    }

    .tasks { grid-area: tasks; }
    .progress { grid-area: progress; }
    .rank { grid-area: rank; }
    .tracker { grid-area: tracker; }
    .chat { grid-area: chat; }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .panel-title h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.15;
    }

    .panel-title a {
      color: #464b5c;
      font-size: 12px;
      font-weight: 800;
      text-decoration: none;
      white-space: nowrap;
    }

    .task-cards {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .task-card {
      min-height: 128px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px;
      border-radius: 18px;
      background: var(--card-bg);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.66);
    }

    .task-card h3 {
      margin: 16px 0 0;
      max-width: 180px;
      font-size: clamp(24px, 2.5vw, 34px);
      line-height: 0.96;
    }

    .task-card.color-only {
      min-height: 54px;
      display: grid;
      grid-template-columns: 132px minmax(0, 1fr) 112px;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
    }

    .color-band {
      width: 100%;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 10px;
      border-radius: 999px;
      color: rgba(46, 49, 64, 0.66);
      background: rgba(255, 255, 255, 0.36);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .inventory-metric {
      display: grid;
      gap: 6px;
      justify-items: start;
      min-width: 0;
    }

    .inventory-metric strong {
      color: #2e3140;
      max-width: 100%;
      overflow: hidden;
      text-overflow: clip;
      font-size: clamp(15px, 1.25vw, 20px);
      line-height: 1;
      white-space: nowrap;
    }

    .task-card.color-only .meter {
      width: 100%;
      margin: 0 auto;
      background: rgba(73, 80, 98, 0.18);
    }

    .pill {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      min-height: 24px;
      padding: 0 12px;
      border-radius: 999px;
      color: rgba(46, 49, 64, 0.68);
      background: rgba(255, 255, 255, 0.42);
      font-size: 11px;
      font-weight: 800;
    }

    .card-foot {
      display: grid;
      gap: 12px;
    }

    .assignees {
      display: flex;
      min-height: 28px;
      padding-left: 6px;
    }

    .assignees .mini-avatar {
      width: 28px;
      height: 28px;
      border-width: 2px;
      font-size: 10px;
    }

    .meter-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      font-weight: 800;
    }

    .meter {
      height: 5px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(73, 80, 98, 0.16);
    }

    .meter span {
      display: block;
      width: var(--value);
      height: 100%;
      border-radius: inherit;
      background: rgba(56, 60, 75, 0.44);
    }

    .progress {
      display: grid;
      grid-template-columns: minmax(180px, 0.72fr) minmax(220px, 1fr);
      gap: 18px;
      align-items: center;
    }

    .progress .panel-title {
      grid-column: 1 / -1;
      margin-bottom: 0;
    }

    .progress-list {
      display: grid;
      gap: 18px;
    }

    .progress-item {
      display: grid;
      grid-template-columns: 14px 1fr;
      gap: 12px;
      align-items: start;
    }

    .dot {
      width: 11px;
      height: 11px;
      margin-top: 4px;
      border-radius: 50%;
      background: var(--dot);
      box-shadow: 0 0 0 5px color-mix(in srgb, var(--dot) 16%, transparent);
    }

    .progress-item span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .progress-item strong {
      display: block;
      margin-top: 4px;
      font-size: 30px;
      line-height: 1;
    }

    .ring-wrap {
      position: relative;
      width: min(310px, 100%);
      aspect-ratio: 1;
      justify-self: center;
    }

    .ring-wrap svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 18px 14px rgba(82, 94, 122, 0.14));
      transform: rotate(-90deg);
    }

    .ring-bg {
      stroke: rgba(156, 169, 190, 0.18);
      stroke-width: 10;
      fill: none;
    }

    .ring {
      fill: none;
      stroke: var(--stroke);
      stroke-linecap: round;
      stroke-width: 10;
      stroke-dasharray: var(--dash) 100;
      stroke-dashoffset: var(--offset);
    }

    .ring-center {
      position: absolute;
      inset: 28%;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(231, 239, 248, 0.6);
      box-shadow: inset 0 2px 14px rgba(90, 105, 135, 0.1);
    }

    .rank-list {
      display: grid;
      gap: 16px;
    }

    .rank-item {
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
    }

    .rank-item strong,
    .rank-item span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .rank-item strong {
      font-size: 13px;
    }

    .rank-item span,
    .points {
      color: var(--muted);
      font-size: 12px;
    }

    .bars {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      align-items: end;
      gap: 14px;
      height: 208px;
      padding-top: 8px;
    }

    .bar-pair {
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: end;
      gap: 7px;
      height: 100%;
      padding: 8px 5px;
      border-radius: 999px;
      background: repeating-linear-gradient(
        -45deg,
        rgba(180, 191, 210, 0.12),
        rgba(180, 191, 210, 0.12) 4px,
        transparent 4px,
        transparent 9px
      );
    }

    .bar {
      min-height: 26px;
      height: var(--h);
      border-radius: 999px;
      background: var(--c);
      box-shadow: inset 0 0 0 3px rgba(255, 255, 255, 0.56);
    }

    .legend {
      display: flex;
      align-items: center;
      gap: 16px;
      color: var(--muted);
      font-size: 11px;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .legend i {
      width: 10px;
      height: 10px;
      border-radius: 3px;
      background: var(--c);
    }

    .chat-list {
      display: grid;
      gap: 18px;
    }

    .message {
      display: grid;
      gap: 8px;
    }

    .message.out {
      justify-items: end;
    }

    .bubble {
      max-width: 86%;
      min-height: 42px;
      display: flex;
      align-items: center;
      border-radius: 18px;
      padding: 12px 16px;
      color: #4d5264;
      background: #ebe6fb;
      font-size: 12px;
      font-weight: 800;
    }

    .message.in .bubble {
      background: #fbd7c9;
    }

    .chat-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }

    .voice {
      display: flex;
      align-items: center;
      gap: 3px;
      min-width: 180px;
      height: 34px;
    }

    .voice i {
      width: 3px;
      height: var(--h);
      border-radius: 999px;
      background: rgba(182, 121, 92, 0.5);
    }

    @media (max-width: 1040px) {
      .dashboard {
        padding: 20px;
      }

      .topbar,
      .project-head {
        grid-template-columns: 1fr;
      }

      .nav {
        justify-content: flex-start;
        overflow-x: auto;
        padding-bottom: 4px;
      }

      .grid {
        grid-template-columns: 1fr 1fr;
        grid-template-areas:
          "tasks tasks"
          "progress progress"
          "rank tracker"
          "chat chat";
      }
    }

    @media (max-width: 720px) {
      .dashboard {
        width: min(100vw - 18px, 1280px);
        margin: 9px auto;
        padding: 12px;
        border-radius: 26px;
      }

      .panel {
        padding: 18px;
        border-radius: 22px;
      }

      .task-cards,
      .grid,
      .progress {
        grid-template-columns: 1fr;
        grid-template-areas: none;
      }

      .tasks,
      .progress,
      .rank,
      .tracker,
      .chat {
        grid-area: auto;
      }

      .task-card {
        min-height: 118px;
      }

      .task-card.color-only {
        grid-template-columns: 1fr;
        min-height: 94px;
      }

      .bars {
        gap: 8px;
      }

    }
  </style>
</head>
<body>
  <main class="dashboard">
    <header class="topbar">
      <nav class="nav" aria-label="Dashboard navigation" id="navItems"></nav>
    </header>

    <section class="project-head">
      <div class="project-title">
        <h1 id="projectName"></h1>
        <p id="projectSubtitle"></p>
      </div>
    </section>

    <section class="grid">
      <section class="panel tasks">
        <div class="panel-title">
          <h2>物料/设备进销存明细</h2>
          <a href="#">库存净减41.4万</a>
        </div>
        <div class="task-cards" id="taskCards"></div>
      </section>

      <section class="panel progress">
        <div class="panel-title">
          <h2>物料/设备设计进度</h2>
          <a href="#" id="totalProjects"></a>
        </div>
        <div class="progress-list" id="progressList"></div>
        <div class="ring-wrap" aria-label="项目完成进度">
          <svg viewBox="0 0 120 120" role="img" aria-hidden="true" id="progressRings">
            <circle class="ring-bg" cx="60" cy="60" r="46"></circle>
            <circle class="ring-bg" cx="60" cy="60" r="35"></circle>
            <circle class="ring-bg" cx="60" cy="60" r="24"></circle>
            <circle class="ring-bg" cx="60" cy="60" r="13"></circle>
          </svg>
          <div class="ring-center"></div>
        </div>
      </section>

      <section class="panel rank">
        <div class="panel-title">
          <h2>物料/设备运费数据分析</h2>
          <a href="#">See All</a>
        </div>
        <div class="rank-list" id="rankList"></div>
      </section>

      <section class="panel tracker">
        <div class="panel-title">
          <h2>Tracker Detail</h2>
          <div class="legend" id="trackerLegend"></div>
          <a href="#">See All</a>
        </div>
        <div class="bars" id="trackerBars"></div>
      </section>

      <section class="panel chat">
        <div class="panel-title">
          <h2>售后跟进情况</h2>
          <a href="#">See All</a>
        </div>
        <div class="chat-list" id="chatList"></div>
      </section>
    </section>
  </main>

  <script>
    const dashboardData = {
      nav: ["全部月份", "1月", "2月", "3月", "4月", "5月", "6月", "7月", "8月", "9月", "10月", "11月", "12月"],
      project: {
        name: "物料/设备看板",
        subtitle: "物料进度、设备状态与任务追踪",
        totalProjects: 57
      },
      tasks: [
        {
          label: "期初库存",
          value: 6319760,
          done: 90,
          total: 100,
          color: "var(--blue)"
        },
        {
          label: "期末库存",
          value: 5905574,
          done: 84,
          total: 100,
          color: "var(--lilac)"
        },
        {
          label: "出库量",
          value: 1112657,
          done: 64,
          total: 100,
          color: "var(--peach)"
        },
        {
          label: "入库量",
          value: 721710,
          done: 48,
          total: 100,
          color: "var(--mint)"
        },
        {
          label: "库存差异",
          value: -698471,
          done: 36,
          total: 100,
          color: "var(--rose)"
        }
      ],
      progress: [
        { label: "已完成", value: 23, color: "var(--purple)" },
        { label: "进行中", value: 14, color: "var(--orange)" },
        { label: "待开始", value: 19, color: "var(--sky)" },
        { label: "已延期", value: 1, color: "#e07190" }
      ],
      rank: [
        { name: "Candy Medina", role: "Marketing Specialist", points: 85, initials: "CM", color: "#f0b766" },
        { name: "Robbin Henson", role: "Product Manager", points: 88, initials: "RH", color: "#7aa9d9" },
        { name: "Maxie Mata", role: "Customer Success", points: 115, initials: "MM", color: "#f5d169" }
      ],
      tracker: {
        legend: [
          { label: "Task Done", color: "var(--orange)" },
          { label: "Need Revision", color: "#c8d8e3" }
        ],
        bars: [
          [46, 64],
          [70, 42],
          [80, 56],
          [62, 74],
          [88, 52],
          [58, 40]
        ]
      },
      chat: [
        { from: "John Tea", type: "text", text: "Hello can you check the latest one?", time: "12:30", align: "out" },
        { from: "Samantha", type: "voice", time: "12:36", align: "in" }
      ]
    };

    const avatarColors = ["#f0b766", "#f48b78", "#7aa9d9", "#6c5b95", "#d98880"];

    function avatar(label, color, className = "mini-avatar") {
      return `<span class="${className}" style="background:${color}">${label}</span>`;
    }

    function renderTop() {
      document.getElementById("navItems").innerHTML = dashboardData.nav
        .map((item, index) => `<button class="${index === 0 ? "active" : ""}">${item}</button>`)
        .join("");

      document.getElementById("projectName").textContent = dashboardData.project.name;
      document.getElementById("projectSubtitle").textContent = dashboardData.project.subtitle;
    }

    function renderTasks() {
      document.getElementById("taskCards").innerHTML = dashboardData.tasks.map((task) => {
        const percent = Math.round((task.done / task.total) * 100);

        return `
          <article class="task-card color-only" style="--card-bg:${task.color};--value:${percent}%">
            <div class="color-band">${task.label}</div>
            <div class="inventory-metric">
              <strong>${formatNumber(task.value)}</strong>
            </div>
            <div class="meter" aria-hidden="true"><span></span></div>
          </article>
        `;
      }).join("");
    }

    function formatNumber(value) {
      return Number(value || 0).toLocaleString("zh-CN");
    }

    function renderProgress() {
      const total = dashboardData.project.totalProjects;
      document.getElementById("totalProjects").textContent = `总计 ${total} 项`;
      document.getElementById("progressList").innerHTML = dashboardData.progress.map((item) => `
        <div class="progress-item">
          <i class="dot" style="--dot:${item.color}"></i>
          <div><span>${item.label}</span><strong>${item.value}项</strong></div>
        </div>
      `).join("");

      const radii = [46, 35, 24, 13];
      const offsets = [0, 12, 24, 36];
      const rings = dashboardData.progress.map((item, index) => {
        const radius = radii[index];
        const percent = total ? Math.round((item.value / total) * 1000) / 10 : 0;
        return `<circle class="ring" cx="60" cy="60" r="${radius}" pathLength="100" style="--stroke:${item.color};--dash:${percent};--offset:${offsets[index]}"></circle>`;
      }).join("");

      document.getElementById("progressRings").insertAdjacentHTML("beforeend", rings);
    }

    function renderRank() {
      document.getElementById("rankList").innerHTML = dashboardData.rank.map((item) => `
        <div class="rank-item">
          ${avatar(item.initials, item.color, "avatar")}
          <div><strong>${item.name}</strong><span>${item.role}</span></div>
          <div class="points">${item.points} Point</div>
        </div>
      `).join("");
    }

    function renderTracker() {
      document.getElementById("trackerLegend").innerHTML = dashboardData.tracker.legend.map((item) => `
        <span><i style="--c:${item.color}"></i>${item.label}</span>
      `).join("");

      document.getElementById("trackerBars").innerHTML = dashboardData.tracker.bars.map((pair) => `
        <div class="bar-pair">
          <i class="bar" style="--h:${pair[0]}%;--c:var(--orange)"></i>
          <i class="bar" style="--h:${pair[1]}%;--c:#c8d8e3"></i>
        </div>
      `).join("");
    }

    function renderChat() {
      const wave = [12, 19, 26, 16, 30, 22, 13, 24, 28, 17, 21, 12, 26, 19, 30, 14, 20, 25, 16, 23];
      document.getElementById("chatList").innerHTML = dashboardData.chat.map((item) => {
        const content = item.type === "voice"
          ? `<div class="voice">${wave.map((height) => `<i style="--h:${height}px"></i>`).join("")}</div>`
          : item.text;

        return `
          <div class="message ${item.align}">
            <div class="chat-meta">${item.align === "in" ? avatar(item.from.slice(0, 1), "#e58258") : ""}<span>${item.from}</span></div>
            <div class="bubble">${content}</div>
            <div class="chat-meta">${item.time}</div>
          </div>
        `;
      }).join("");
    }

    renderTop();
    renderTasks();
    renderProgress();
    renderRank();
    renderTracker();
    renderChat();
  </script>
</body>
</html>
