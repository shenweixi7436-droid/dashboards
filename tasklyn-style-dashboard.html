<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>物料/设备看板</title>
  <style>
    @font-face {
      font-family: "HuaKangW7";
      src: url("file:///C:/Users/shenw/Desktop/看板/字体/华康圆体-W7.ttf") format("truetype");
      font-weight: 500;
      font-display: swap;
    }

    @font-face {
      font-family: "HuaKangW8";
      src: url("file:///C:/Users/shenw/Desktop/看板/字体/华康圆体-W8.ttf") format("truetype");
      font-weight: 700;
      font-display: swap;
    }

    @font-face {
      font-family: "HuaKangW9";
      src: url("file:///C:/Users/shenw/Desktop/看板/字体/华康圆体-W9.ttf") format("truetype");
      font-weight: 800;
      font-display: swap;
    }

    @font-face {
      font-family: "GothamRndBold";
      src: url("file:///C:/Users/shenw/Desktop/看板/字体/GOTHAMRND-BOLD.otf") format("opentype");
      font-weight: 800;
      font-display: swap;
    }

    :root {
      --brand-yellow: #ffcc00;
      --brand-brown: #632c16;
      --brand-red: #d93924;
      --page-bg: #fff3bd;
      --shell-bg: rgba(255, 204, 0, 0.12);
      --panel-bg: rgba(255, 255, 255, 0.82);
      --panel-strong: rgba(255, 255, 255, 0.9);
      --ink: var(--brand-brown);
      --muted: rgba(99, 44, 22, 0.62);
      --line: rgba(99, 44, 22, 0.14);
      --nav: var(--brand-brown);
      --blue: rgba(255, 204, 0, 0.30);
      --lilac: rgba(99, 44, 22, 0.14);
      --peach: rgba(217, 57, 36, 0.18);
      --mint: rgba(255, 204, 0, 0.18);
      --rose: rgba(217, 57, 36, 0.14);
      --orange: var(--brand-red);
      --purple: var(--brand-brown);
      --sky: var(--brand-yellow);
      --shadow: 0 22px 60px rgba(99, 44, 22, 0.16);
      --soft-shadow: 0 14px 30px rgba(99, 44, 22, 0.10);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 14px;
      --font-main: "HuaKangW7", "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      --font-level-1: "HuaKangW9", "HuaKangW8", "Microsoft YaHei", sans-serif;
      --font-level-2: "HuaKangW8", "HuaKangW7", "Microsoft YaHei", sans-serif;
      --font-level-3: "HuaKangW7", "Microsoft YaHei", sans-serif;
      --font-number: "GothamRndBold", "Arial Black", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 14%, rgba(255, 255, 255, 0.62), transparent 30%),
        radial-gradient(circle at 84% 16%, rgba(255, 204, 0, 0.36), transparent 28%),
        linear-gradient(135deg, #fff6cd 0%, #fffdf4 48%, #f6e1d6 100%);
      font-family: var(--font-main);
      letter-spacing: 0;
    }

    button {
      font: inherit;
    }

    h1,
    .project-title h1 {
      font-family: var(--font-level-1);
      font-weight: 800;
    }

    h2,
    .panel-title h2,
    .nav button.active {
      font-family: var(--font-level-2);
      font-weight: 700;
    }

    .panel-title a,
    .project-title p,
    .color-band,
    .progress-item span,
    .freight-legend,
    .legend,
    .device-summary,
    .chat-meta,
    .bubble {
      font-family: var(--font-level-3);
      font-weight: 500;
    }

    .inventory-metric strong,
    .progress-item strong,
    .freight-axis,
    .freight-month,
    .device-label,
    .points,
    .chart-tooltip {
      font-family: var(--font-number);
      letter-spacing: 0;
    }

    .dashboard {
      width: min(1280px, calc(100vw - 32px));
      margin: 28px auto;
      padding: 28px;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 36px;
      background: var(--shell-bg);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr;
      align-items: center;
      gap: 24px;
      min-height: 58px;
      padding: 10px 18px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 14px 34px rgba(99, 44, 22, 0.08);
    }

    .nav {
      display: flex;
      justify-content: center;
      gap: 6px;
      min-width: 0;
      overflow-x: auto;
      padding: 0 4px 4px;
    }

    .nav button {
      border: 0;
      cursor: pointer;
      color: rgba(99, 44, 22, 0.72);
      background: transparent;
      border-radius: 999px;
      min-height: 38px;
      padding: 0 14px;
      white-space: nowrap;
      transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
    }

    .nav button:hover {
      transform: translateY(-1px);
    }

    .nav button.active {
      color: #fff;
      background: var(--nav);
      box-shadow: 0 12px 22px rgba(99, 44, 22, 0.22);
    }

    .avatar,
    .mini-avatar {
      display: grid;
      place-items: center;
      overflow: hidden;
      border-radius: 50%;
      font-weight: 800;
      color: #fff;
      background: linear-gradient(135deg, var(--brand-yellow), var(--brand-red));
      box-shadow: 0 8px 16px rgba(99, 44, 22, 0.16);
    }

    .avatar {
      width: 42px;
      height: 42px;
      font-size: 16px;
    }

    .project-head {
      display: grid;
      grid-template-columns: 1fr;
      align-items: center;
      gap: 20px;
      margin: 26px 8px 20px;
    }

    .project-title h1 {
      margin: 0 0 6px;
      font-size: clamp(21px, 2.2vw, 30px);
      line-height: 1.1;
    }

    .project-title p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .mini-avatar {
      width: 34px;
      height: 34px;
      margin-left: -8px;
      border: 3px solid rgba(255, 255, 255, 0.82);
      font-size: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr 0.62fr;
      grid-template-areas:
        "tasks rank rank"
        "progress tracker chat";
      gap: 18px;
    }

    .panel {
      min-width: 0;
      padding: 22px;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: var(--radius-xl);
      background: var(--panel-bg);
      box-shadow: var(--soft-shadow);
      backdrop-filter: blur(18px);
    }

    .tasks { grid-area: tasks; }
    .progress { grid-area: progress; }
    .rank { grid-area: rank; }
    .tracker { grid-area: tracker; }
    .chat { grid-area: chat; }

    .progress,
    .rank {
      cursor: pointer;
    }

    .tasks,
    .rank {
      min-height: 430px;
    }

    .tasks {
      width: calc(100% + 42px);
    }

    .rank {
      width: calc(100% - 42px);
      justify-self: end;
    }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .panel-title h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.15;
    }

    .panel-title a {
      color: #464b5c;
      font-size: 12px;
      font-weight: 800;
      text-decoration: none;
      white-space: nowrap;
    }

    .task-cards {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .task-card {
      min-height: 128px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px;
      border-radius: 18px;
      background: var(--card-bg);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.66);
    }

    .task-card h3 {
      margin: 16px 0 0;
      max-width: 180px;
      font-size: clamp(24px, 2.5vw, 34px);
      line-height: 0.96;
    }

    .task-card.color-only {
      min-height: 54px;
      display: grid;
      grid-template-columns: 132px minmax(0, 1fr) 112px;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
    }

    .color-band {
      width: 100%;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 10px;
      border-radius: 999px;
      color: rgba(46, 49, 64, 0.66);
      background: rgba(255, 255, 255, 0.36);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .inventory-metric {
      display: grid;
      gap: 6px;
      justify-items: start;
      min-width: 0;
    }

    .inventory-metric strong {
      color: var(--ink);
      max-width: 100%;
      overflow: hidden;
      text-overflow: clip;
      font-size: clamp(15px, 1.25vw, 20px);
      line-height: 1;
      white-space: nowrap;
    }

    .task-card.color-only .meter {
      width: 100%;
      margin: 0 auto;
      background: rgba(73, 80, 98, 0.18);
    }

    .pill {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      min-height: 24px;
      padding: 0 12px;
      border-radius: 999px;
      color: rgba(46, 49, 64, 0.68);
      background: rgba(255, 255, 255, 0.42);
      font-size: 11px;
      font-weight: 800;
    }

    .card-foot {
      display: grid;
      gap: 12px;
    }

    .assignees {
      display: flex;
      min-height: 28px;
      padding-left: 6px;
    }

    .assignees .mini-avatar {
      width: 28px;
      height: 28px;
      border-width: 2px;
      font-size: 10px;
    }

    .meter-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      font-weight: 800;
    }

    .meter {
      height: 5px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(73, 80, 98, 0.16);
    }

    .meter span {
      display: block;
      width: var(--value);
      height: 100%;
      border-radius: inherit;
      background: rgba(56, 60, 75, 0.44);
    }

    .progress {
      display: grid;
      grid-template-columns: minmax(126px, 0.64fr) minmax(160px, 1fr);
      gap: 12px;
      align-items: center;
    }

    .progress .panel-title {
      grid-column: 1 / -1;
      margin-bottom: 0;
    }

    .progress.panel {
      overflow: hidden;
    }

    .progress-list {
      display: grid;
      gap: 10px;
    }

    .progress-item {
      display: grid;
      grid-template-columns: 14px 1fr;
      gap: 12px;
      align-items: start;
    }

    .dot {
      width: 11px;
      height: 11px;
      margin-top: 4px;
      border-radius: 50%;
      background: var(--dot);
      box-shadow: 0 0 0 5px color-mix(in srgb, var(--dot) 16%, transparent);
    }

    .progress-item span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .progress-item strong {
      display: block;
      margin-top: 4px;
      font-size: 22px;
      line-height: 1;
    }

    .progress-chart {
      width: min(240px, 100%);
      min-height: 188px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      align-items: end;
      gap: 12px;
      justify-self: center;
      padding: 16px 14px 12px;
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(220, 231, 244, 0.42), rgba(255, 255, 255, 0.12)),
        repeating-linear-gradient(0deg, transparent 0 38px, rgba(156, 169, 190, 0.12) 39px 40px);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.55), 0 18px 18px rgba(82, 94, 122, 0.08);
    }

    .progress-bar-item {
      min-width: 0;
      height: 148px;
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 8px;
      justify-items: center;
    }

    .progress-bar-track {
      width: min(34px, 72%);
      height: 100%;
      display: flex;
      align-items: flex-end;
      border-radius: 999px;
      background: rgba(156, 169, 190, 0.16);
      overflow: hidden;
    }

    .progress-bar-fill {
      width: 100%;
      height: var(--h);
      min-height: 8px;
      border-radius: inherit;
      background: var(--bar-color);
      box-shadow: inset 0 0 0 3px rgba(255, 255, 255, 0.38);
    }

    .progress-bar-label {
      max-width: 100%;
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
      white-space: nowrap;
    }

    .rank-list {
      display: block;
    }

    .freight-legend {
      display: flex;
      gap: 14px;
      margin-bottom: 10px;
      color: var(--muted);
      font-family: var(--font-level-3);
      font-size: 11px;
      font-weight: 500;
    }

    .freight-legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .freight-legend i {
      width: 10px;
      height: 10px;
      border-radius: 3px;
      background: var(--c);
    }

    .freight-chart {
      width: 100%;
      height: 218px;
      display: block;
      overflow: visible;
    }

    .freight-axis,
    .freight-month {
      fill: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }

    .freight-grid {
      stroke: rgba(99, 44, 22, 0.16);
      stroke-width: 1;
    }

    .freight-bar {
      fill: var(--brand-brown);
      rx: 8;
    }

    .freight-bar.is-muted,
    .freight-dot.is-muted,
    .device-fill.is-muted {
      opacity: 0.42;
    }

    .freight-bar.is-selected,
    .freight-dot.is-selected {
      fill: var(--brand-red);
    }

    .freight-line {
      fill: none;
      stroke: var(--orange);
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .freight-dot {
      fill: var(--orange);
      stroke: rgba(255, 255, 255, 0.72);
      stroke-width: 3;
    }

    .freight-summary {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      color: var(--ink);
      background: rgba(255, 204, 0, 0.16);
      font-family: var(--font-level-3);
      font-size: 12px;
      line-height: 1.55;
    }

    .freight-summary strong {
      font-family: var(--font-number);
      font-weight: 800;
    }

    .freight-summary .top-list {
      margin-top: 4px;
      display: block;
      white-space: normal;
      overflow-wrap: anywhere;
    }

    .rank-item {
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
    }

    .rank-item strong,
    .rank-item span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .rank-item strong {
      font-size: 13px;
    }

    .rank-item span,
    .points {
      color: var(--muted);
      font-size: 12px;
    }

    .bars {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      align-items: end;
      gap: 14px;
      height: 208px;
      padding-top: 8px;
    }

    .bar-pair {
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: end;
      gap: 7px;
      height: 100%;
      padding: 8px 5px;
      border-radius: 999px;
      background: repeating-linear-gradient(
        -45deg,
        rgba(180, 191, 210, 0.12),
        rgba(180, 191, 210, 0.12) 4px,
        transparent 4px,
        transparent 9px
      );
    }

    .bar {
      min-height: 26px;
      height: var(--h);
      border-radius: 999px;
      background: var(--c);
      box-shadow: inset 0 0 0 3px rgba(255, 255, 255, 0.56);
    }

    .device-chart {
      height: 178px;
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      align-items: end;
      gap: 10px;
      padding: 10px 4px 0;
    }

    .device-month {
      height: 100%;
      min-width: 0;
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 8px;
      justify-items: center;
    }

    .device-track {
      width: min(28px, 70%);
      height: 100%;
      display: flex;
      align-items: flex-end;
      overflow: hidden;
      border-radius: 999px;
      background: repeating-linear-gradient(
        -45deg,
        rgba(180, 191, 210, 0.12),
        rgba(180, 191, 210, 0.12) 4px,
        transparent 4px,
        transparent 9px
      );
    }

    .device-fill {
      width: 100%;
      height: var(--h);
      min-height: 8px;
      border-radius: inherit;
      background: var(--brand-brown);
      box-shadow: inset 0 0 0 3px rgba(255, 255, 255, 0.46);
    }

    .device-fill.is-selected {
      background: var(--brand-red);
    }

    .device-label {
      color: var(--muted);
      font-family: var(--font-number);
      font-size: 10px;
      font-weight: 800;
      white-space: nowrap;
    }

    .device-summary {
      margin-top: 10px;
      color: var(--ink);
      font-family: var(--font-level-3);
      font-size: 12px;
      font-weight: 500;
      line-height: 1.45;
    }

    .chart-tooltip {
      position: fixed;
      z-index: 20;
      display: none;
      max-width: 220px;
      padding: 9px 11px;
      border-radius: 10px;
      color: #fff;
      background: rgba(99, 44, 22, 0.94);
      box-shadow: 0 12px 24px rgba(99, 44, 22, 0.18);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.55;
      white-space: pre-line;
      pointer-events: none;
    }

    .legend {
      display: flex;
      align-items: center;
      gap: 16px;
      color: var(--muted);
      font-family: var(--font-level-3);
      font-size: 11px;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .legend i {
      width: 10px;
      height: 10px;
      border-radius: 3px;
      background: var(--c);
    }

    .chat-list {
      display: grid;
      gap: 18px;
    }

    .message {
      display: grid;
      gap: 8px;
    }

    .message.out {
      justify-items: end;
    }

    .bubble {
      max-width: 86%;
      min-height: 42px;
      display: flex;
      align-items: center;
      border-radius: 18px;
      padding: 12px 16px;
      color: #4d5264;
      background: #ebe6fb;
      font-size: 12px;
      font-weight: 800;
    }

    .message.in .bubble {
      background: #fbd7c9;
    }

    .chat-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }

    .voice {
      display: flex;
      align-items: center;
      gap: 3px;
      min-width: 180px;
      height: 34px;
    }

    .voice i {
      width: 3px;
      height: var(--h);
      border-radius: 999px;
      background: rgba(182, 121, 92, 0.5);
    }

    @media (max-width: 1040px) {
      .dashboard {
        padding: 20px;
      }

      .topbar,
      .project-head {
        grid-template-columns: 1fr;
      }

      .nav {
        justify-content: flex-start;
        overflow-x: auto;
        padding-bottom: 4px;
      }

      .grid {
        grid-template-columns: 1fr 1fr;
        grid-template-areas:
          "tasks tasks"
          "progress progress"
          "rank tracker"
          "chat chat";
      }

      .tasks,
      .rank {
        min-height: auto;
        width: auto;
        justify-self: stretch;
      }
    }

    @media (max-width: 720px) {
      .dashboard {
        width: min(100vw - 18px, 1280px);
        margin: 9px auto;
        padding: 12px;
        border-radius: 26px;
      }

      .panel {
        padding: 18px;
        border-radius: 22px;
      }

      .task-cards,
      .grid,
      .progress {
        grid-template-columns: 1fr;
        grid-template-areas: none;
      }

      .tasks,
      .progress,
      .rank,
      .tracker,
      .chat {
        grid-area: auto;
      }

      .task-card {
        min-height: 118px;
      }

      .task-card.color-only {
        grid-template-columns: 1fr;
        min-height: 94px;
      }

      .bars {
        gap: 8px;
      }

    }
  </style>
</head>
<body>
  <main class="dashboard">
    <header class="topbar">
      <nav class="nav" aria-label="Dashboard navigation" id="navItems"></nav>
    </header>

    <section class="project-head">
      <div class="project-title">
        <h1 id="projectName"></h1>
        <p id="projectSubtitle"></p>
      </div>
    </section>

    <section class="grid">
      <section class="panel tasks">
        <div class="panel-title">
          <h2>物料/设备进销存明细</h2>
          <a href="#">库存净减41.4万</a>
        </div>
        <div class="task-cards" id="taskCards"></div>
      </section>

      <section class="panel progress">
        <div class="panel-title">
          <h2>物料/设备设计进度</h2>
          <a href="#" id="totalProjects"></a>
        </div>
        <div class="progress-list" id="progressList"></div>
        <div class="progress-chart" id="progressBars" aria-label="物料设备设计进度柱状图"></div>
      </section>

      <section class="panel rank">
        <div class="panel-title">

      const yAmount = (value) => chart.bottom - (value / maxAmount) * (chart.bottom - chart.top);

        const x = chart.left + step * index + step / 2;
        return [x, yAmount(item.amount)];
      });

    function setupChartTooltips() {
      const tooltip = document.getElementById("chartTooltip");
      const show = (event) => {
        const target = event.target.closest(".has-tip");
        if (!target) return;
        tooltip.textContent = target.dataset.tip || "";
        tooltip.style.display = "block";
        move(event);
      };
      const move = (event) => {
        if (tooltip.style.display !== "block") return;
        tooltip.style.left = `${event.clientX + 14}px`;
        tooltip.style.top = `${event.clientY + 14}px`;
      };
      const hide = () => {
        tooltip.style.display = "none";
      };

      document.addEventListener("mouseover", show);
      document.addEventListener("mousemove", move);
      document.addEventListener("mouseout", (event) => {
        if (event.target.closest(".has-tip")) hide();
      });
    }

      `;

      const data = linkedMonthlyData.device;
      const max = Math.max(...data.map((item) => item.qty), 1);
      document.getElementById("trackerBars").innerHTML = data.map((item) => {
        const h = Math.max(6, Math.round((item.qty / max) * 100));
        const tip = `${item.month}\n设备出库量：${formatNumber(item.qty)}台`;
        return `
          <div class="device-month">
            <div class="device-track">
              <i class="device-fill has-tip${getMonthClass(item.month)}" data-tip="${tip}" style="--h:${h}%"></i>
            </div>
            <span class="device-label">${item.month}</span>
          </div>
        `;
      }).join("");

      const summaryMonth = getLinkedMonth("device");
      const summary = linkedMonthlyData.deviceSummaryByMonth[summaryMonth] || {
        channels: [
          { name: "鸣忙", qty: 0 },
          { name: "省区", qty: 0 },
          { name: "特殊渠道", qty: 0 }
        ]
      };
      document.getElementById("deviceSummary").textContent = `${summaryMonth}${summary.channels.map((item) => `${item.name}渠道发货${formatNumber(item.qty)}台`).join("、")}`;
    }

    renderTop();
    renderTasks();
    renderProgress();
    renderRank();
    renderTracker();
    renderChat();
    setupChartTooltips();
    setupCardLinks();
  </script>
</body>
</html>
